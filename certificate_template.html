<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>강사 활동 증명서</title>
  <style>
    @page {
      size: A4 portrait;
      margin: 30mm 20mm 30mm 20mm;
    }
    body {
      font-family: 'Nanum Gothic', sans-serif;
      max-width: 700px;
      margin: auto;
      padding: 40px 30px;
      border: 2px solid #888;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      line-height: 1.8;
      background: #fff;
    }
    h1 {
      text-align: center;
      font-size: 28px;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 2px solid #000;
    }
    .code {
      text-align: right;
      font-size: 16px;
      color: #555;
      margin-bottom: 30px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 30px;
    }
    td {
      border: 1px solid #444;
      padding: 12px;
      font-size: 16px;
    }
    td.label {
      background-color: #f0f0f8;
      width: 22%;
      font-weight: bold;
      text-align: center;
    }
    .center-text {
      text-align: center;
      margin: 30px 0 10px;
      font-size: 18px;
    }
    .signature {
      text-align: center;
      margin-top: 50px;
      font-size: 24px;
    }
    .signature img {
      height: 60px;
      vertical-align: middle;
      margin-left: -2px;
      border: 1px solid #aaa;
    }
  </style>
</head>
<body>
  <h1>강사 활동 증명서</h1>
  <div class="code">{{ 발급번호 }}</div>

  <table>
    <tr>
      <td class="label" style="width: 200px; height: 40px;">성명</td>
      <td>{{ 성명 }}</td>
      <td class="label">주민등록번호</td>
      <td>{{ 주민번호 }}</td>
    </tr>
    <tr>
      <td class="label"" style="width: 200px; height: 40px;">주소</td>
      <td colspan="3">{{ 주소 }}</td>
    </tr>
    <tr>
      <td class="label"" style="width: 200px; height: 40px;">직책</td>
      <td colspan="3">방과후 {{ 과목 }} 강사</td>
    </tr>
    <tr>
      <td class="label"" style="width: 200px; height: 40px;">업무내용</td>
      <td colspan="3">{{ 장소 }} 방과후 {{ 과목 }} 주1회 교육</td>
    </tr>
    <tr>
      <td class="label"" style="width: 200px; height: 40px;">근무기간</td>
      <td colspan="3">{{ 시작 }} ~ {{ 종료 }}</td>
    </tr>
  </table>

<br><br>

  <p class="center-text">상기인은 위와 같이 (사)새담청소년교육문화원에서 근무하였음을 증명합니다.</p>

<br><br>

  <p class="center-text">{{ 발급일자 }}</p>

<br><br>

  <div class="signature">
   (사)새담청소년교육문화원 이사장 배호영
    <img src="seal.gif" style="width: 15%; height: auto;" style="border: 0; outline: none;" alt="도장">
  </div>

</body>
</html>
